<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Haliltale</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#000; overflow:hidden;
  width:100vw; height:100vh;
  font-family:'Courier New',monospace;
  touch-action:none; user-select:none;
}
#gameCanvas { display:block; width:100vw; height:100vh; image-rendering:pixelated; }

/* LOBBY */
#lobby {
  position:fixed; inset:0; background:#000;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center; z-index:100;
}
#lobby h1 {
  font-size:clamp(24px,6vw,64px); color:#ff4444;
  text-shadow:0 0 30px #ff0000,0 0 60px #ff000055;
  margin-bottom:8vh; letter-spacing:6px;
}
#lobbyBtns { display:flex; flex-direction:column; gap:2vh; }
.lobbyBtn {
  font-size:clamp(14px,3vw,28px); padding:1.5vh 8vw;
  background:transparent; border:2px solid #ff4444; color:#fff;
  cursor:pointer; font-family:'Courier New',monospace;
  letter-spacing:3px; transition:all .2s;
}
.lobbyBtn:hover,.lobbyBtn:active { background:#ff4444; color:#000; }

/* DIALOGUE */
#dialogue {
  position:fixed; bottom:4%; left:50%; transform:translateX(-50%);
  width:85%; background:rgba(0,0,0,.92);
  border:2px solid #ffffff77; padding:2vh 3vw; color:#fff;
  font-size:clamp(12px,2.5vw,22px); display:none;
  z-index:200; text-align:center; border-radius:10px;
}
#dialogueImg {
  width:clamp(40px,8vw,80px); height:auto;
  display:block; margin:0 auto 1vh; image-rendering:pixelated;
}

/* LOADING */
#loadingScreen {
  position:fixed; inset:0; background:#000;
  display:none; flex-direction:column;
  align-items:center; justify-content:center; z-index:300; color:#fff;
}
#loadingScreen h2 { font-size:clamp(16px,4vw,40px); margin-bottom:4vh; }
#loadingBar { width:60%; height:clamp(14px,2.5vh,24px); background:#222; border:2px solid #fff; border-radius:4px; overflow:hidden; }
#loadingFill { height:100%; background:#ff4444; width:0; }

/* HUD */
#hud {
  position:fixed; top:2%; left:50%; transform:translateX(-50%);
  display:none; flex-direction:column; align-items:center;
  z-index:50; pointer-events:none;
}
#hpLabel { color:#fff; font-size:clamp(10px,2vw,18px); margin-bottom:4px; }
#hpBar { width:clamp(160px,30vw,320px); height:clamp(10px,2.5vh,22px); background:#333; border:2px solid #fff; border-radius:4px; overflow:hidden; }
#hpFill { height:100%; background:#22cc44; transition:width .2s,background .2s; }
#weaponIcon { margin-top:6px; color:#ffcc00; font-size:clamp(10px,2vw,18px); }

/* PHONE */
#phoneUI {
  position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
  width:clamp(200px,45vw,380px); background:#111;
  border:3px solid #555; border-radius:14px;
  padding:2vh 3vw; display:none; z-index:400; color:#fff; pointer-events:all;
}
#phoneUI h3 { text-align:center; font-size:clamp(14px,2.5vw,22px); margin-bottom:2vh; color:#aaf; }
.phoneApp {
  display:inline-block; width:30%; text-align:center;
  padding:1.2vh 0; border:1px solid #444; margin:1%;
  font-size:clamp(9px,1.8vw,16px); border-radius:6px; cursor:pointer; background:#222;
}
.phoneApp:hover { background:#334; }
#closePhone {
  display:block; margin:2vh auto 0; background:#cc2222; border:none;
  color:#fff; padding:1vh 4vw; font-size:clamp(11px,2vw,18px);
  cursor:pointer; border-radius:6px;
}

/* MOBILE CONTROLS */
#mobileControls {
  position:fixed; bottom:2%; width:100%;
  display:none; justify-content:space-between;
  padding:0 3vw; z-index:50; pointer-events:none; align-items:flex-end;
}
#dpad {
  display:grid;
  grid-template-columns:repeat(3,clamp(44px,11vw,76px));
  grid-template-rows:repeat(3,clamp(44px,11vw,76px));
  gap:2px; pointer-events:all;
}
.dpadBtn {
  background:rgba(255,255,255,.12); border:2px solid rgba(255,255,255,.35);
  border-radius:8px; color:#fff; font-size:clamp(16px,4vw,28px);
  display:flex; align-items:center; justify-content:center; cursor:pointer; pointer-events:all;
}
#actionBtns { display:flex; flex-direction:column; gap:2vw; align-items:flex-end; pointer-events:all; }
.actionBtn {
  width:clamp(48px,14vw,90px); height:clamp(48px,14vw,90px);
  background:rgba(255,80,80,.2); border:2px solid rgba(255,80,80,.5);
  border-radius:50%; color:#fff; font-size:clamp(9px,2.2vw,16px);
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; pointer-events:all; text-align:center;
}
#phoneActionBtn { background:rgba(80,180,255,.2); border-color:rgba(80,180,255,.5); }

/* END */
#endScreen {
  position:fixed; inset:0; background:rgba(0,0,0,.93);
  display:none; flex-direction:column; align-items:center; justify-content:center;
  z-index:500; color:#fff; text-align:center; padding:5%;
}
#endScreen h1 { font-size:clamp(20px,5vw,52px); margin-bottom:3vh; color:#ffcc00; }
#endScreen p { font-size:clamp(12px,2.5vw,22px); line-height:2; }
#endScreen button {
  margin-top:4vh; font-size:clamp(12px,2.5vw,20px); padding:1.5vh 5vw;
  background:#ff4444; border:none; color:#fff; cursor:pointer;
  border-radius:6px; font-family:'Courier New',monospace;
}

/* DAMAGE FLASH */
#dmgFlash { position:fixed; inset:0; background:rgba(255,0,0,.3); display:none; z-index:80; pointer-events:none; }

/* APPLE HINT */
#appleHint {
  position:fixed; top:14%; left:50%; transform:translateX(-50%);
  color:#88ff88; font-size:clamp(11px,2vw,18px);
  background:rgba(0,70,0,.8); padding:6px 18px;
  border-radius:8px; display:none; z-index:60; pointer-events:none;
}
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>

<div id="lobby">
  <h1>HALİLTALE</h1>
  <div id="lobbyBtns">
    <button class="lobbyBtn" id="btnOyna">OYNA</button>
    <button class="lobbyBtn" id="btnMarket">MARKET</button>
    <button class="lobbyBtn" id="btnCik">ÇIK</button>
  </div>
</div>

<div id="dialogue">
  <img id="dialogueImg" src="" alt="">
  <span id="dialogueText"></span>
</div>

<div id="loadingScreen">
  <h2>Yükleniyor...</h2>
  <div id="loadingBar"><div id="loadingFill"></div></div>
</div>

<div id="hud">
  <div id="hpLabel">CAN: <span id="hpNum">50</span></div>
  <div id="hpBar"><div id="hpFill" style="width:100%"></div></div>
  <div id="weaponIcon">Silah: Yok</div>
</div>

<div id="phoneUI">
  <h3>📱 Telefon</h3>
  <div class="phoneApp" onclick="phoneApp('Not Defteri')">📝 Not</div>
  <div class="phoneApp" onclick="phoneApp('Kamera')">📷 Kamera</div>
  <div class="phoneApp" onclick="phoneApp('Fotoğraflar')">🖼️ Foto</div>
  <div class="phoneApp" onclick="phoneApp('Mesajlar')">💬 Mesaj</div>
  <div class="phoneApp" onclick="phoneApp('Müzik')">🎵 Müzik</div>
  <div class="phoneApp" onclick="phoneApp('Ayarlar')">⚙️ Ayar</div>
  <button id="closePhone">Kapat</button>
</div>

<div id="mobileControls">
  <div id="dpad">
    <div></div><div class="dpadBtn" id="dUp">▲</div><div></div>
    <div class="dpadBtn" id="dLeft">◄</div><div></div><div class="dpadBtn" id="dRight">►</div>
    <div></div><div class="dpadBtn" id="dDown">▼</div><div></div>
  </div>
  <div id="actionBtns">
    <div class="actionBtn" id="jumpBtn">↑<br>ZIPLA</div>
    <div class="actionBtn" id="attackBtn">⚔<br>VURU</div>
    <div class="actionBtn" id="phoneActionBtn">📱</div>
  </div>
</div>

<div id="endScreen">
  <h1 id="endTitle">🎉 TEBRİKLER! 🎉</h1>
  <p id="endText">Bu oyun bir özel deneydir!<br>Nifugames'in diğer oyunları ile bağlantısı yoktur!<br>Teşekkürler.</p>
  <button onclick="location.reload()">Girişe Dön</button>
</div>

<div id="dmgFlash"></div>
<div id="appleHint">🍎 +2.5 CAN!</div>

<script>
// ============================
// ASSET PATHS
// Klasör yapısına göre:
//   halil/index.html
//   halil/Ekran_görüntüsü_2026-05-18_230844-removebg-preview.png
//   halil/okarun.png
//   halil/silah.png
//   halil/Textures/Nabel_face.png
//   halil/Textures/Nabel_friend3.png
//   halil/Textures/testere.png
//   halil/Textures/zombi.png
//   halil/Textures/kafkaous.png
//   halil/Sounds/analobi.wav  ...vb.
// ============================
const IMG_SRC = {
  player:   'Ekran_görüntüsü_2026-05-18_230844-removebg-preview.png',
  okarun:   'okarun.png',
  silah:    'silah.png',
  nabel:    'Textures/Nabel_face.png',
  friend3:  'Textures/Nabel_friend3.png',
  testere:  'Textures/testere.png',
  zombi:    'Textures/zombi.png',
  kafkaous: 'Textures/kafkaous.png',
};
const SND_SRC = {
  analobi:     'Sounds/analobi.wav',
  lobises2:    'Sounds/lobises2.wav',
  muzik1:      'Sounds/muzik1.wav',
  nabelvs:     'Sounds/nabelvs.wav',
  savasmuzigi: 'Sounds/savasmuzigi.wav',
  telefonses:  'Sounds/telefonses.wav',
  ozelcagri:   'Sounds/özelvscagrisim.wav',
};

const IMGS={}, SNDS={};
function loadAll(cb){
  let done=0;
  const total=Object.keys(IMG_SRC).length+Object.keys(SND_SRC).length;
  const tick=()=>{if(++done>=total)cb();};
  for(const[k,s]of Object.entries(IMG_SRC)){
    const i=new Image(); i.onload=i.onerror=()=>{IMGS[k]=i;tick();}; i.src=s;
  }
  for(const[k,s]of Object.entries(SND_SRC)){
    const a=new Audio();
    const go=()=>{SNDS[k]=a;tick();};
    a.addEventListener('canplaythrough',go,{once:true});
    a.addEventListener('error',go,{once:true});
    a.src=s; a.load();
  }
}

let bgm=null;
function playBGM(k,loop=true){
  if(bgm){bgm.pause();bgm.currentTime=0;}
  if(!SNDS[k])return; bgm=SNDS[k]; bgm.loop=loop; bgm.currentTime=0; bgm.play().catch(()=>{});
}
function stopBGM(){if(bgm){bgm.pause();bgm.currentTime=0;}bgm=null;}
function playSFX(k){if(!SNDS[k])return;const c=SNDS[k].cloneNode();c.play().catch(()=>{});}

// ============================
// CANVAS
// ============================
const canvas=document.getElementById('gameCanvas');
const ctx=canvas.getContext('2d');
let groundY;
function resize(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;groundY=canvas.height*.72;}
window.addEventListener('resize',resize); resize();

// ============================
// GAME STATE
// ============================
let phase='lobby';
let keys={};
let player=null;
let enemies=[], bullets=[], parts=[], apples=[];
let hp=50, maxHp=50;
let weapon='none';
let dialogueActive=false;

// intro helpers
let nabelExitX=-9999, nabelExitOn=false;
let f3X=-9999, f3Angle=0, f3On=false;
let nabelPassX=-9999, nabelPassOn=false;

// wave flags
let w1done=false, w2done=false, kdone=false, finalAllDead=false;
let phoneAvailable=false;

// nabel final
let nfClones=[], nfPhase=false;

// apple spawn interval ref
let appleInterval=null;

// ============================
// INPUT
// ============================
window.addEventListener('keydown',e=>{
  keys[e.key]=true;
  if(['ArrowUp','w','W',' '].includes(e.key))tryJump();
  if(['x','X','Enter'].includes(e.key))doAttack();
  if(['p','P'].includes(e.key))openPhone();
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key))e.preventDefault();
});
window.addEventListener('keyup',e=>keys[e.key]=false);

function addHold(id,key){
  const el=document.getElementById(id);
  el.addEventListener('touchstart',e=>{e.preventDefault();keys[key]=true;},{passive:false});
  el.addEventListener('touchend',e=>{e.preventDefault();keys[key]=false;},{passive:false});
}
addHold('dUp','ArrowUp'); addHold('dDown','ArrowDown');
addHold('dLeft','ArrowLeft'); addHold('dRight','ArrowRight');
document.getElementById('jumpBtn').addEventListener('touchstart',e=>{e.preventDefault();tryJump();},{passive:false});
document.getElementById('attackBtn').addEventListener('touchstart',e=>{e.preventDefault();doAttack();},{passive:false});
document.getElementById('phoneActionBtn').addEventListener('touchstart',e=>{e.preventDefault();openPhone();},{passive:false});
canvas.addEventListener('click',()=>{
  if(!player||dialogueActive)return;
  if(weapon==='none'){weapon='testere';updateWeapon();}
  else doAttack();
});
document.getElementById('closePhone').onclick=()=>document.getElementById('phoneUI').style.display='none';

// ============================
// PLAYER
// ============================
function mkPlayer(){
  return{x:canvas.width*.15,y:groundY,w:canvas.width*.06,h:canvas.height*.16,
         vy:0,onGround:true,facing:1,atkCD:0,invCD:0};
}
function tryJump(){if(!player||!player.onGround)return;player.vy=-canvas.height*.024;player.onGround=false;}
function doAttack(){
  if(!player||player.atkCD>0||dialogueActive)return;
  player.atkCD=28;
  if(weapon==='testere')meleeHit(88,10);
  else if(weapon==='silah')fireBullet();
}
function meleeHit(rng,dmg){
  const cx=player.x+player.w/2,cy=player.y+player.h/2;
  for(const e of enemies){
    if(!e.alive)continue;
    if(Math.abs(e.x+e.w/2-cx)<rng&&Math.abs(e.y+e.h/2-cy)<e.h*.8){
      e.hp-=dmg;burst(e.x+e.w/2,e.y+e.h/2,'#ff3300');
      if(e.hp<=0)killEnemy(e);
    }
  }
  for(const n of nfClones){
    if(!n.alive)continue;
    if(Math.abs(n.x+n.w/2-cx)<rng&&Math.abs(n.y+n.h/2-cy)<n.h*.8){
      n.hp-=dmg;burst(n.x+n.w/2,n.y+n.h/2,'#00ccff');
      if(n.hp<=0){n.alive=false;onNabelCloneDie();}
    }
  }
}
function fireBullet(){
  bullets.push({x:player.x+player.w/2,y:player.y+player.h*.4,
                vx:player.facing*canvas.width*.013,vy:0,dmg:5,own:true});
}
function updatePlayer(dt){
  if(!player)return;
  const spd=canvas.width*.006;
  if(keys['ArrowLeft']||keys['a']||keys['A']){player.x-=spd*dt;player.facing=-1;}
  if(keys['ArrowRight']||keys['d']||keys['D']){player.x+=spd*dt;player.facing=1;}
  player.vy+=1.1*dt; player.y+=player.vy*dt;
  if(player.y>=groundY){player.y=groundY;player.vy=0;player.onGround=true;}
  player.x=Math.max(0,Math.min(canvas.width-player.w,player.x));
  if(player.atkCD>0)player.atkCD-=dt;
  if(player.invCD>0)player.invCD-=dt;
  // apple pick
  for(let i=apples.length-1;i>=0;i--){
    const a=apples[i];
    if(Math.abs(a.x-(player.x+player.w/2))<42&&Math.abs(a.y-(player.y+player.h*.5))<55){
      hp=Math.min(maxHp,hp+2.5); updateHUD(); apples.splice(i,1); showAppleHint();
    }
  }
}
function drawPlayer(){
  if(!player)return;
  ctx.save();
  if(player.invCD>0&&Math.floor(player.invCD/4)%2===0)ctx.globalAlpha=.35;
  if(player.facing===-1){
    ctx.translate(player.x+player.w,0);ctx.scale(-1,1);
    ctx.drawImage(IMGS.player,0,player.y,player.w,player.h);
  }else{
    ctx.drawImage(IMGS.player,player.x,player.y,player.w,player.h);
  }
  ctx.restore();
  if(weapon==='testere'){
    const wx=player.facing>0?player.x+player.w*.6:player.x-player.w*.32;
    ctx.drawImage(IMGS.testere,wx,player.y+player.h*.3,player.w*.65,player.w*.65);
  }else if(weapon==='silah'){
    const wx=player.facing>0?player.x+player.w*.72:player.x-player.w*.42;
    ctx.drawImage(IMGS.silah,wx,player.y+player.h*.38,player.w*.78,player.w*.38);
  }
}

// ============================
// APPLES
// ============================
function spawnApple(){
  apples.push({x:canvas.width*(.12+Math.random()*.76),y:groundY+10,bob:Math.random()*Math.PI*2});
}
function drawApples(t){
  for(const a of apples){
    const b=Math.sin(t*.003+a.bob)*6;
    ctx.save();ctx.translate(a.x,a.y+b);
    // body
    ctx.fillStyle='#dd1111';
    ctx.beginPath();ctx.arc(0,-18,13,0,Math.PI*2);ctx.fill();
    // shine
    ctx.fillStyle='rgba(255,255,255,.22)';
    ctx.beginPath();ctx.arc(-4,-22,5,0,Math.PI*2);ctx.fill();
    // stem
    ctx.strokeStyle='#552200';ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(0,-31);ctx.lineTo(0,-38);ctx.stroke();
    // leaf
    ctx.fillStyle='#22bb22';
    ctx.beginPath();ctx.ellipse(5,-37,7,4,Math.PI*.35,0,Math.PI*2);ctx.fill();
    ctx.restore();
  }
}
function showAppleHint(){
  const el=document.getElementById('appleHint');
  el.style.display='block';clearTimeout(el._t);
  el._t=setTimeout(()=>el.style.display='none',1300);
}

// ============================
// ENEMIES
// ============================
function mkZombie(x){
  return{type:'zombi',img:'zombi',hp:30,maxHp:30,alive:true,deathT:0,
    x:x??canvas.width*.85,y:groundY,w:canvas.width*.07,h:canvas.height*.16,spd:canvas.width*.0025,atkCD:0};
}
function mkKafkaous(x){
  return{type:'kafkaous',img:'kafkaous',hp:100,maxHp:100,alive:true,deathT:0,
    x:x??canvas.width*.75,y:groundY,w:canvas.width*.09,h:canvas.height*.22,spd:canvas.width*.0018,
    atkCD:0,teleT:210,cloneT:380,shootT:90,sawT:140};
}
function mkFriend3(x){
  return{type:'friend3',img:'friend3',hp:999,maxHp:999,alive:true,deathT:0,
    x:x??canvas.width*.88,y:groundY,w:canvas.width*.07,h:canvas.height*.15,spd:canvas.width*.002,
    atkCD:0,stole:false};
}
function mkOkarun(x){
  return{type:'okarun',img:'okarun',hp:350,maxHp:350,alive:true,deathT:0,
    x:x??canvas.width*.65,y:groundY,w:canvas.width*.085,h:canvas.height*.21,spd:canvas.width*.0015,
    atkCD:0,phoneT:260};
}
function killEnemy(e){
  e.alive=false;e.deathT=50;
  burst(e.x+e.w/2,e.y+e.h/2,'#ff6600');
  if(Math.random()<.4)spawnApple();
}
function updateEnemies(dt){
  if(!player)return;
  const px=player.x+player.w/2,py=player.y+player.h/2;
  for(const e of enemies){
    if(!e.alive){if(e.deathT>0)e.deathT-=dt;continue;}
    const ex=e.x+e.w/2,dir=px<ex?-1:1;
    e.x+=dir*e.spd*dt; e.atkCD-=dt;

    if(e.type==='zombi'){
      if(Math.abs(ex-px)<e.w*.9&&e.atkCD<=0){e.atkCD=90;takeDmg(5);}
    }
    if(e.type==='friend3'){
      if(Math.abs(ex-px)<e.w*.9&&e.atkCD<=0){
        e.atkCD=100;takeDmg(15);
        if(!e.stole){e.stole=true;weapon='none';updateWeapon();
          showDialogue(null,'Nabel_friend3 testereni çaldı ve kafanı kesti! -15 CAN',2200);}
      }
    }
    if(e.type==='kafkaous'){
      e.teleT-=dt;e.cloneT-=dt;e.shootT-=dt;e.sawT-=dt;
      if(Math.abs(ex-px)<e.w*.8&&e.atkCD<=0){e.atkCD=55;takeDmg(20);}
      if(e.shootT<=0){e.shootT=85+Math.random()*40;
        bullets.push({x:ex,y:e.y+e.h*.4,vx:(px>ex?1:-1)*canvas.width*.009,vy:0,dmg:5,own:false});}
      if(e.sawT<=0){e.sawT=135+Math.random()*50;
        bullets.push({x:ex,y:e.y+e.h*.5,vx:(px>ex?1:-1)*canvas.width*.006,vy:0,dmg:10,own:false,saw:true});}
      if(e.teleT<=0){e.teleT=155+Math.random()*80;
        e.x=Math.random()>.5?canvas.width*.1:canvas.width*.7;burst(e.x+e.w/2,e.y+e.h/2,'#aa00ff');}
      if(e.cloneT<=0&&enemies.filter(x=>x.type==='kafkaous'&&x.alive).length<3){
        e.cloneT=420;const cl=mkKafkaous(e.x+canvas.width*(Math.random()>.5?.22:-.22));
        cl.hp=35;cl.maxHp=35;enemies.push(cl);}
    }
    if(e.type==='okarun'){
      e.phoneT-=dt;
      if(Math.abs(ex-px)<e.w*.8&&e.atkCD<=0){e.atkCD=70;takeDmg(8);}
      if(phoneAvailable&&e.phoneT<=0){e.phoneT=210+Math.random()*60;
        showDialogue(null,'📱 Okarun telefonu kafana fırlattı! -5 CAN',1500);takeDmg(5);}
    }
  }
}
function drawEnemies(){
  for(const e of enemies){
    if(!e.alive&&e.deathT<=0)continue;
    ctx.save();
    if(!e.alive)ctx.globalAlpha=Math.max(0,e.deathT/50);
    ctx.drawImage(IMGS[e.img],e.x,e.y,e.w,e.h);
    if(e.alive){
      ctx.fillStyle='#222';ctx.fillRect(e.x,e.y-10,e.w,6);
      ctx.fillStyle='#ff2200';ctx.fillRect(e.x,e.y-10,e.w*(e.hp/e.maxHp),6);
    }
    ctx.restore();
  }
}

// ============================
// BULLETS
// ============================
function updateBullets(dt){
  const p=player;
  for(let i=bullets.length-1;i>=0;i--){
    const b=bullets[i];
    b.x+=b.vx*dt;b.y+=b.vy*dt;
    if(b.x<-60||b.x>canvas.width+60||b.y<-60||b.y>canvas.height+60){bullets.splice(i,1);continue;}
    if(b.own){
      let hit=false;
      for(const e of enemies){
        if(!e.alive)continue;
        if(b.x>e.x&&b.x<e.x+e.w&&b.y>e.y&&b.y<e.y+e.h){
          e.hp-=b.dmg;burst(b.x,b.y,'#ff8800');
          if(e.hp<=0)killEnemy(e);
          bullets.splice(i,1);hit=true;break;
        }
      }
      if(!hit&&i<bullets.length){
        for(const n of nfClones){
          if(!n.alive)continue;
          if(b.x>n.x&&b.x<n.x+n.w&&b.y>n.y&&b.y<n.y+n.h){
            n.hp-=b.dmg;burst(b.x,b.y,'#00ccff');
            if(n.hp<=0){n.alive=false;onNabelCloneDie();}
            bullets.splice(i,1);break;
          }
        }
      }
    }else{
      if(p&&p.invCD<=0&&b.x>p.x&&b.x<p.x+p.w&&b.y>p.y&&b.y<p.y+p.h){
        takeDmg(b.dmg);p.invCD=38;bullets.splice(i,1);
      }
    }
  }
}
function drawBullets(){
  for(const b of bullets){
    if(b.saw){ctx.drawImage(IMGS.testere,b.x-14,b.y-14,28,28);continue;}
    ctx.fillStyle=b.own?'#ffee00':'#ff4400';
    ctx.beginPath();ctx.arc(b.x,b.y,6,0,Math.PI*2);ctx.fill();
  }
}

// ============================
// PARTICLES
// ============================
function burst(x,y,col){for(let i=0;i<8;i++)parts.push({x,y,vx:(Math.random()-.5)*6,vy:(Math.random()-.5)*6,life:28,col});}
function updateParts(dt){for(let i=parts.length-1;i>=0;i--){const p=parts[i];p.x+=p.vx*dt;p.y+=p.vy*dt;p.life-=dt;if(p.life<=0)parts.splice(i,1);}}
function drawParts(){for(const p of parts){ctx.save();ctx.globalAlpha=Math.max(0,p.life/28);ctx.fillStyle=p.col;ctx.beginPath();ctx.arc(p.x,p.y,4,0,Math.PI*2);ctx.fill();ctx.restore();}}

// ============================
// DAMAGE
// ============================
function takeDmg(amount){
  if(!player||player.invCD>20)return;
  hp=Math.max(0,hp-amount);player.invCD=42;updateHUD();
  const f=document.getElementById('dmgFlash');f.style.display='block';
  clearTimeout(f._t);f._t=setTimeout(()=>f.style.display='none',160);
  if(hp<=0)endGame(false);
}

// ============================
// HUD
// ============================
function updateHUD(){
  document.getElementById('hpNum').textContent=Math.ceil(hp);
  const pct=Math.max(0,hp/maxHp*100);
  const f=document.getElementById('hpFill');
  f.style.width=pct+'%';
  f.style.background=pct>50?'#22cc44':pct>25?'#ffcc00':'#ff2222';
}
function updateWeapon(){
  const lb={none:'Silah: Yok',testere:'🪚 Testere',silah:'🔫 Tabanca'};
  document.getElementById('weaponIcon').textContent=lb[weapon]||'';
}
function showHUD(){
  document.getElementById('hud').style.display='flex';
  document.getElementById('mobileControls').style.display='flex';
}

// ============================
// DIALOGUE
// ============================
function showDialogue(imgKey,text,dur,cb){
  const box=document.getElementById('dialogue');
  const img=document.getElementById('dialogueImg');
  const txt=document.getElementById('dialogueText');
  box.style.display='block';dialogueActive=true;
  img.style.display=imgKey?'block':'none';
  if(imgKey)img.src=IMG_SRC[imgKey]||'';
  txt.textContent=text;
  clearTimeout(box._t);
  box._t=setTimeout(()=>{box.style.display='none';dialogueActive=false;if(cb)cb();},dur||2500);
}
function hideDialogue(){document.getElementById('dialogue').style.display='none';dialogueActive=false;}
function dlgChain(steps,finalCb){
  let i=0;
  function next(){if(i>=steps.length){if(finalCb)finalCb();return;}const s=steps[i++];showDialogue(s.img,s.text,s.dur||3000,next);}
  next();
}

// ============================
// LOADING SCREEN
// ============================
function showLoading(cb){
  const ls=document.getElementById('loadingScreen');ls.style.display='flex';
  const fill=document.getElementById('loadingFill');let p=0;
  const iv=setInterval(()=>{p+=2;fill.style.width=p+'%';if(p>=100){clearInterval(iv);setTimeout(()=>{ls.style.display='none';cb();},400);}},40);
}

// ============================
// PHONE
// ============================
function openPhone(){
  if(!phoneAvailable)return;
  document.getElementById('phoneUI').style.display='block';playSFX('telefonses');
}
function phoneApp(name){alert('📱 '+name+' açıldı!');}

// ============================
// NABEL FINAL CLONES
// ============================
function mkNabelClone(x,isMain){
  return{x:x??canvas.width*.5,y:groundY,w:canvas.width*.065,h:canvas.height*.13,
         hp:isMain?20:10,maxHp:isMain?20:10,alive:true,isMain:!!isMain,
         cloneT:270+Math.random()*80,atkCD:0,phoneT:isMain?280:9999};
}
function startNabelFinal(){
  nfPhase=true;phase='nabelFinal';
  stopBGM();playBGM('nabelvs');
  nfClones=[mkNabelClone(canvas.width*.35,false),mkNabelClone(canvas.width*.55,false),mkNabelClone(canvas.width*.72,false)];
  showDialogue('nabel','Sadece ben kaldım! Ama bu bitmedi!',2500);
}
function updateNabelFinals(dt){
  if(!player)return;
  const px=player.x+player.w/2;
  const alive=nfClones.filter(n=>n.alive);
  for(const n of nfClones){
    if(!n.alive)continue;
    const dir=px<n.x+n.w/2?-1:1;
    n.x+=dir*canvas.width*.003*dt;
    n.cloneT-=dt;n.phoneT-=dt;n.atkCD-=dt;
    // Contact dmg
    if(player.invCD<=0&&Math.abs(n.x+n.w/2-px)<n.w&&Math.abs(n.y+n.h/2-(player.y+player.h*.5))<n.h*.75){
      takeDmg(3);player.invCD=45;
    }
    // Phone throw (final 1 clone only)
    if(alive.length<=1&&n.phoneT<=0&&phoneAvailable){
      n.phoneT=230;showDialogue('nabel','📱 Telefonu fırlattım!',1200);takeDmg(5);
    }
    // Cloning
    if(n.cloneT<=0&&alive.length<6){
      n.cloneT=300+Math.random()*100;
      nfClones.push(mkNabelClone(n.x+canvas.width*(Math.random()>.5?.2:-.2),false));
    }
  }
  // When 3 alive → shrink to 1 main with 20 hp
  if(alive.length<=3&&alive.length>1&&phase==='nabelFinal'){
    // Let player kill naturally — this triggers in onNabelCloneDie
  }
}
function drawNabelFinals(){
  for(const n of nfClones){
    if(!n.alive)continue;
    ctx.drawImage(IMGS.nabel,n.x,n.y,n.w,n.h);
    ctx.fillStyle='#222';ctx.fillRect(n.x,n.y-10,n.w,5);
    ctx.fillStyle='#00ccff';ctx.fillRect(n.x,n.y-10,n.w*(n.hp/n.maxHp),5);
  }
}
function onNabelCloneDie(){
  const alive=nfClones.filter(n=>n.alive);
  if(alive.length===0){endGame(true);return;}
  // At 3 remaining: consolidate to 1 main
  if(alive.length<=3&&!alive.some(n=>n.isMain)){
    for(let i=1;i<alive.length;i++)alive[i].alive=false;
    alive[0].isMain=true;alive[0].hp=20;alive[0].maxHp=20;alive[0].phoneT=300;
  }
}

// ============================
// WAVE CHECKS
// ============================
function checkWaves(){
  const alive=enemies.filter(e=>e.alive);
  if(phase==='wave1'&&!w1done&&enemies.length>0&&alive.length===0){w1done=true;afterWave1();}
  if(phase==='wave2'&&!w2done&&enemies.length>0&&alive.length===0){w2done=true;afterWave2();}
  if(phase==='kafkaousFight'&&!kdone&&enemies.length>0&&alive.length===0){kdone=true;afterKafkaous();}
  if(phase==='finalWave'&&!finalAllDead){
    const nfAlive=nfClones.filter(n=>n.alive).length;
    if(alive.length===0&&nfAlive===0){finalAllDead=true;startNabelFinal();}
  }
}

// ============================
// WAVE SEQUENCE
// ============================
function afterWave1(){
  // Nabel gökyüzünden süzülür
  nabelPassX=-canvas.width*.08;nabelPassOn=true;
  setTimeout(()=>{nabelPassOn=false;wave2();},3200);
}
function wave2(){
  phase='wave2';enemies=[];
  weapon='silah';updateWeapon();
  showDialogue(null,'🔫 Silah elde edildi! 10 zombi geliyor!',2000);
  stopBGM();playBGM('savasmuzigi');
  for(let i=0;i<10;i++)setTimeout(()=>enemies.push(mkZombie(canvas.width*(.65+Math.random()*.32))),i*440);
  spawnApple();
}
function afterWave2(){
  phase='kafkaousFight';enemies=[];
  stopBGM();playBGM('ozelcagri');
  showDialogue('kafkaous','Ben final boslarındanım. Beni yendikten sonra sadece birisi kalıcak hıhıhı!',4200,()=>{
    maxHp=60;hp=60;updateHUD();
    enemies.push(mkKafkaous(canvas.width*.75));
    spawnApple();
  });
}
function afterKafkaous(){
  phase='okarunScene';enemies=[];
  stopBGM();playSFX('lobises2');
  showDialogue('okarun','Biraz uyusak mı? 😴',2500,()=>{
    takeDmg(10);
    setTimeout(()=>{
      showDialogue('nabel','O 10 canı ben aldım! Ben aslında hep düşmanınızdım!',3500,()=>startFinalWave());
    },400);
  });
}
function startFinalWave(){
  phase='finalWave';enemies=[];
  maxHp=120;hp=120;updateHUD();
  phoneAvailable=true;
  stopBGM();playBGM('nabelvs');
  // 5 zombi
  for(let i=0;i<5;i++)setTimeout(()=>enemies.push(mkZombie(canvas.width*(.58+Math.random()*.36))),i*340);
  // 1 kafkaous
  setTimeout(()=>{const k=mkKafkaous(canvas.width*.8);enemies.push(k);},2100);
  // 1 friend3
  setTimeout(()=>enemies.push(mkFriend3(canvas.width*.88)),3400);
  // okarun
  setTimeout(()=>enemies.push(mkOkarun(canvas.width*.65)),4600);
  // Nabel klonlar başta da saldırır
  nfClones=[mkNabelClone(canvas.width*.35,false),mkNabelClone(canvas.width*.6,false),mkNabelClone(canvas.width*.78,false)];
  nfPhase=true;
  spawnApple();spawnApple();
}

// ============================
// INTRO
// ============================
function startIntro(){
  document.getElementById('lobby').style.display='none';
  phase='intro';playBGM('lobises2');
  dlgChain([
    {img:'nabel',text:'Hey Halil merhaba!',dur:3000},
    {img:'nabel',text:'Bugün senin doğum günün!',dur:3000},
    {img:'nabel',text:'Ama... Bir kaç değişiklik var.',dur:3000},
    {img:'nabel',text:'Amacın bu bozukluğu yok etmek.',dur:3500},
  ],()=>{
    hideDialogue();
    // Nabel çıkıyor
    nabelExitX=canvas.width*.45;nabelExitOn=true;
    const iv=setInterval(()=>nabelExitX+=canvas.width*.013,16);
    setTimeout(()=>{
      clearInterval(iv);nabelExitOn=false;
      // Friend3 dönerek giriyor
      f3X=-canvas.width*.12;f3Angle=0;f3On=true;
      playBGM('lobises2');
      const iv2=setInterval(()=>{f3X+=canvas.width*.009;f3Angle+=0.1;
        if(f3X>=canvas.width*.38){clearInterval(iv2);
          setTimeout(()=>{f3On=false;showLoading(beginGameplay);},1400);}
      },16);
    },1900);
  });
}

function beginGameplay(){
  phase='wave1';
  player=mkPlayer();
  maxHp=50;hp=50;weapon='none';
  enemies=[];bullets=[];parts=[];apples=[];
  w1done=false;w2done=false;kdone=false;finalAllDead=false;
  nfPhase=false;nfClones=[];
  updateHUD();updateWeapon();showHUD();
  stopBGM();playBGM('muzik1');
  setTimeout(()=>enemies.push(mkZombie(canvas.width*.85)),1200);
  spawnApple();
  // Periyodik elma
  if(appleInterval)clearInterval(appleInterval);
  appleInterval=setInterval(()=>{if(player&&phase!=='lobby'&&phase!=='intro')spawnApple();},20000);
}

// ============================
// END
// ============================
function endGame(win){
  stopBGM();if(appleInterval)clearInterval(appleInterval);
  const scr=document.getElementById('endScreen');
  if(win){
    document.getElementById('endTitle').textContent='🎉 TEBRİKLER! 🎉';
    document.getElementById('endText').innerHTML='Bu oyun bir özel deneydir!<br>Nifugames\'in diğer oyunları ile bağlantısı yoktur!<br>Teşekkürler.';
  }else{
    document.getElementById('endTitle').textContent='💀 ÖLDÜN 💀';
    document.getElementById('endText').innerHTML='Haliltale bitti...<br>Tekrar dene!';
  }
  scr.style.display='flex';
}

// ============================
// DRAW BG
// ============================
function drawBG(){
  const g=ctx.createLinearGradient(0,0,0,canvas.height);
  g.addColorStop(0,'#08080f');g.addColorStop(1,'#12060a');
  ctx.fillStyle=g;ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle='#1a0c04';
  ctx.fillRect(0,groundY+canvas.height*.15,canvas.width,canvas.height);
  ctx.strokeStyle='#4a2a0a';ctx.lineWidth=3;
  ctx.beginPath();ctx.moveTo(0,groundY+canvas.height*.15);ctx.lineTo(canvas.width,groundY+canvas.height*.15);ctx.stroke();
}

// ============================
// MAIN LOOP
// ============================
let lastT=0;
function loop(ts){
  const dt=Math.min((ts-lastT)/16.67,3);lastT=ts;
  ctx.clearRect(0,0,canvas.width,canvas.height);
  drawBG();

  // Intro anims
  if(nabelExitOn)ctx.drawImage(IMGS.nabel,nabelExitX,canvas.height*.32,canvas.width*.08,canvas.height*.15);
  if(f3On){
    ctx.save();ctx.translate(f3X+canvas.width*.04,canvas.height*.42);ctx.rotate(f3Angle);
    ctx.drawImage(IMGS.friend3,-canvas.width*.04,-canvas.height*.075,canvas.width*.08,canvas.height*.15);
    ctx.restore();
  }
  if(nabelPassOn){
    nabelPassX+=canvas.width*.007*dt;
    ctx.drawImage(IMGS.nabel,nabelPassX,canvas.height*.08,canvas.width*.08,canvas.height*.14);
  }

  if(player){
    updatePlayer(dt);
    updateEnemies(dt);
    if(nfPhase)updateNabelFinals(dt);
    updateBullets(dt);
    updateParts(dt);
    drawApples(ts);
    drawParts();
    drawBullets();
    drawEnemies();
    if(nfPhase)drawNabelFinals();
    drawPlayer();
    checkWaves();
  }
  requestAnimationFrame(loop);
}

// ============================
// BUTTONS
// ============================
document.getElementById('btnOyna').onclick=()=>startIntro();
document.getElementById('btnMarket').onclick=()=>alert('Market yakında açılıyor!');
document.getElementById('btnCik').onclick=()=>window.close();

// ============================
// BOOT
// ============================
loadAll(()=>{playBGM('analobi');requestAnimationFrame(loop);});
</script>
